name: Docker Publish

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: db2connection
  DOCKER_REGISTRY_HOST: ${{ secrets.DOCKER_REGISTRY_HOST }}
  DOCKER_REPOSITORY: ${{ secrets.DOCKER_REPOSITORY }}

jobs:
  build-and-push-linux:
    name: Build & Push Linux image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU and buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.DOCKER_REGISTRY_HOST }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Linux image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_REGISTRY_HOST }}/${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY_HOST }}/${{ env.DOCKER_REPOSITORY }}:latest

  build-and-push-windows:
    name: Build & Push Windows image (self-hosted)
    runs-on: [ self-hosted, windows, x64 ]
    # no 'if' here — job will only execute if a matching self-hosted runner is available
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker registry
        run: docker login ${{ env.DOCKER_REGISTRY_HOST }} -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Windows image
        run: |
          docker build -f Dockerfile.windows -t ${{ env.DOCKER_REGISTRY_HOST }}/${{ env.DOCKER_REPOSITORY }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_REGISTRY_HOST }}/${{ env.DOCKER_REPOSITORY }}:${{ github.sha }} ${{ env.DOCKER_REGISTRY_HOST }}/${{ env.DOCKER_REPOSITORY }}:latest

      - name: Push Windows image
        run: |
          docker push ${{ env.DOCKER_REGISTRY_HOST }}/${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
          docker push ${{ env.DOCKER_REGISTRY_HOST }}/${{ env.DOCKER_REPOSITORY }}:latest