name: CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: |
          if dotnet test --list-tests 2>&1 | grep -q "No test"; then
            echo "No tests found, skipping dotnet test"
          else
            dotnet test --no-build -c Release --logger "trx"
          fi