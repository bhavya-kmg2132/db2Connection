name: CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    name: Build, Test (.NET 9) and Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      # - name: Build
      #   run: dotnet build --no-restore -c Release

      # - name: Test
      #   run: |
      #     if dotnet test --list-tests 2>&1 | grep -q "No test"; then
      #       echo "No tests found, skipping dotnet test"
      #     else
      #       dotnet test --no-build -c Release --logger "trx"
      #     fi

      - name: Set up QEMU and buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_HOST }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_REGISTRY_HOST }}/${{ secrets.DOCKER_REPOSITORY }}:ci-${{ github.sha }}